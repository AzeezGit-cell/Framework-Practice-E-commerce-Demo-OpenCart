
version: "3"
services:

  selenium-hub:
    image: selenium/hub:4.43.0
    container_name: selenium-hub
    networks:
      - selenium-grid
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"

  chrome:
    image: selenium/node-chrome:4.43.0
    container_name: chrome-node
    shm_size: 2gb
    networks:
      - selenium-grid
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=10      
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true  

  edge:
    image: selenium/node-edge:4.43.0
    container_name: edge-node
    shm_size: 2gb
    networks:
      - selenium-grid
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=10     
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  firefox:
    image: selenium/node-firefox:4.43.0
    container_name: firefox-node
    shm_size: 2gb
    networks:
      - selenium-grid
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=10       
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

networks:
  selenium-grid:
    driver: bridge